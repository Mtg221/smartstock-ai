version: '3.9'

services:
  # ─── Base de données ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smartstock_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartstock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartstock_secret}
      POSTGRES_DB: ${POSTGRES_DB:-smartstock}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartstock}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock_net

  # ─── Cache Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartstock_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock_net

  # ─── Backend Node.js/Express ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartstock_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smartstock}:${POSTGRES_PASSWORD:-smartstock_secret}@postgres:5432/${POSTGRES_DB:-smartstock}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    networks:
      - smartstock_net

  # ─── Service IA Python/FastAPI ───────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: smartstock_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
    depends_on:
      - postgres
    networks:
      - smartstock_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend Next.js ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: smartstock_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - smartstock_net

  # ─── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: smartstock_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
      - ai-service
    networks:
      - smartstock_net

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  nginx_logs:

networks:
  smartstock_net:
    driver: bridge
